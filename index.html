<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>猫管理</title>

<style>
body{
font-family:sans-serif;
margin:20px;
background:#f5f5f5;
}

h1{
text-align:center;
}

button{
padding:10px 15px;
font-size:18px;
margin:5px;
border:none;
border-radius:8px;
}

.urine{
background:#4da6ff;
color:white;
}

.poop{
background:#8b5a2b;
color:white;
}

.accident{
background:#ffcc00;
}

</style>
</head>

  <body>

<h1>🐱 猫管理</h1>

<button onclick="addCat()">➕ 猫追加</button>

<button onclick="addTime()">➕ 時間追加</button>

<table border="1" id="board" style="margin-top:20px;border-collapse:collapse;">
</table>

<script>
let cats = [
"アース",
"ちっぷ",
"大将",
"ラク",
"こと"
];

let times = ["10:00","12:00"];

const records = {};

function renderBoard(){

  const board = document.getElementById("board");

  let html = "<tr><th>猫</th>";

  times.forEach(time=>{
    html += `<th>${time}</th>`;
  });

  html += "</tr>";

  cats.forEach(cat=>{

    html += `<tr><td>${cat}</td>`;

    times.forEach(time=>{

      const key = cat + "_" + time;
      const value = records[key] || "";

      html += `
      <td
        onclick="editCell('${cat}','${time}')"
        style="
          width:90px;
          height:50px;
          text-align:center;
          cursor:pointer;
          font-size:14px;
        ">
        ${value}
      </td>`;
    });

    html += "</tr>";

  });

  board.innerHTML = html;
}
function addCat(){

  const name = prompt("猫の名前を入力");

  if(!name) return;

  cats.push(name);

  renderBoard();
}
  
function addTime(){

  const time = prompt("時間を入力");

  if(!time) return;

  times.push(time);

  renderBoard();
}

function editCell(cat,time){

  const choice = prompt(
`記録を選択

1 💧
2 💩
3 ⚠️
4 IN
5 OUT
6 😴
7 🍞`
  );

  const map = {
    "1":"💧",
    "2":"💩",
    "3":"⚠️",
    "4":"IN",
    "5":"OUT",
    "6":"😴",
    "7":"🍞"
  };

  if(!map[choice]) return;

  const key = cat + "_" + time;

  records[key] = (records[key] || "") + map[choice];

  renderBoard();
}

renderBoard();
</script>

</body>
</html>
