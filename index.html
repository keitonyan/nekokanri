<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>猫管理</title>

<style>
body{
font-family:sans-serif;
margin:20px;
background:#f5f5f5;
}

h1{
text-align:center;
}

button{
padding:10px 15px;
font-size:18px;
margin:5px;
border:none;
border-radius:8px;
}

.urine{
background:#4da6ff;
color:white;
}

.poop{
background:#8b5a2b;
color:white;
}

.accident{
background:#ffcc00;
}

</style>
</head>

  <body>

<h1>🐱 猫管理</h1>

<button onclick="addTime()">➕ 時間追加</button>

<table border="1" id="board" style="margin-top:20px;border-collapse:collapse;">
</table>

<script>
const cats = [
"アース",
"ちっぷ",
"大将",
"ラク",
"こと"
];

let times = ["10:00","12:00"];

function renderBoard(){

  const board = document.getElementById("board");

  let html = "<tr><th>猫</th>";

  times.forEach(time=>{
    html += `<th>${time}</th>`;
  });

  html += "</tr>";

  cats.forEach(cat=>{

    html += `<tr><td>${cat}</td>`;

    times.forEach(()=>{
      html += `<td style="width:80px;height:50px;"></td>`;
    });

    html += "</tr>";

  });

  board.innerHTML = html;
}

function addTime(){

  const time = prompt("時間を入力してください");

  if(!time) return;

  times.push(time);

  renderBoard();
}

renderBoard();

</script>

</body>
</html>
