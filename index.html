<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>猫管理</title>

<style>

body{
    font-family:sans-serif;
    padding:20px;
}

h1{
    text-align:center;
}

button{
    padding:8px 12px;
    margin:3px;
}

table{
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    text-align:center;
}

th{
    background:#f5f5f5;
}

.cat-name{
    min-width:100px;
}

.cell{
    width:90px;
    height:60px;
    cursor:pointer;
    font-size:14px;
    overflow:hidden;
}

#popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    border:1px solid #ccc;
    border-radius:10px;
    padding:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    z-index:999;
}

.popup-btn{
    font-size:20px;
    margin:5px;
}

</style>
</head>

<body>

<h1>🐱 猫管理</h1>

<button onclick="addCat()">➕ 猫追加</button>
<button onclick="addTime()">➕ 時間追加</button>

<table id="board"></table>

<div id="popup">

<button class="popup-btn" onclick="addRecord('💧')">💧</button>
<button class="popup-btn" onclick="addRecord('💩')">💩</button>
<button class="popup-btn" onclick="addRecord('⚠️')">⚠️</button>

<br>

<button class="popup-btn" onclick="addRecord('IN')">IN</button>
<button class="popup-btn" onclick="addRecord('OUT')">OUT</button>

<br>

<button class="popup-btn" onclick="addRecord('😴')">😴</button>
<button class="popup-btn" onclick="addRecord('🍞')">🍞</button>

<br><br>
<br><br>

<button onclick="deleteRecord()">🗑個別削除</button>
<button onclick="closePopup()">閉じる</button>

</div>

<script>

let cats = JSON.parse(
localStorage.getItem("cats")
) || [
"アース",
"ちっぷ",
"大将",
"ラク",
"こと"
];

let times = JSON.parse(
localStorage.getItem("times")
) || [
"10:00",
"12:00"
];

let records = JSON.parse(
localStorage.getItem("records")
) || {};

let currentCell = "";

function renderBoard(){

    let html = "<tr><th>猫</th>";

    times.forEach(time=>{
        html += `<th>${time}</th>`;
    });

    html += "</tr>";

    cats.forEach(cat=>{

        html += `<tr>`;
        html += `<td class="cat-name">${cat}</td>`;

        times.forEach(time=>{

            const key = cat + "_" + time;
            const value = records[key] || "";

            html += `
            <td
            class="cell"
            onclick="editCell('${cat}','${time}')">
            ${value}
            </td>
            `;

        });

        html += "</tr>";

    });

    document.getElementById("board").innerHTML = html;
}

function addCat(){

    const name = prompt("猫の名前");

    if(!name) return;

 cats.push(name);

localStorage.setItem(
  "cats",
  JSON.stringify(cats)
);

renderBoard();
}

function addTime(){

    const time = prompt("時間");

if(!time) return;

times.push(time);

localStorage.setItem(
  "times",
  JSON.stringify(times)
);

renderBoard();
}

function editCell(cat,time){

    currentCell = cat + "_" + time;

    document.getElementById("popup").style.display = "block";
}

function addRecord(icon){

    records[currentCell] =
    (records[currentCell] || "") + icon;

    localStorage.setItem(
      "records",
      JSON.stringify(records)
    );

    closePopup();

    renderBoard();
}

function closePopup(){

    document.getElementById("popup").style.display = "none";
}
function deleteRecord(){

    const current = records[currentCell] || "";

    if(current === ""){
        alert("記録なし");
        return;
    }

    const target = prompt(
      "削除したい記録を入力\n\n" +
      current
    );

    if(!target) return;

    records[currentCell] =
      current.replace(target,"");

    localStorage.setItem(
      "records",
      JSON.stringify(records)
    );

    renderBoard();

    closePopup();
}
renderBoard();

</script>

</body>
</html>
