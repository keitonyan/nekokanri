<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>猫管理</title>

<style>
body{
font-family:sans-serif;
margin:20px;
background:#f5f5f5;
}

h1{
text-align:center;
}

button{
padding:10px 15px;
font-size:18px;
margin:5px;
border:none;
border-radius:8px;
}

.urine{
background:#4da6ff;
color:white;
}

.poop{
background:#8b5a2b;
color:white;
}

.accident{
background:#ffcc00;
}

</style>
</head>

<body>

<h1>🐱 猫管理</h1>

<div id="cats"></div>

<script>
const cats = [
"アース",
"ちっぷ",
"大将",
"ラク",
"こと"
];

const container = document.getElementById("cats");

cats.forEach(cat => {
  const card = document.createElement("div");

  card.innerHTML = `
    <h3>${cat}</h3>

    <button>💧</button>
    <button>💩</button>
    <button>⚠️</button>
    <button>IN</button>
    <button>OUT</button>

    <hr>
  `;

  container.appendChild(card);
});
</script>

</body>
</html>
